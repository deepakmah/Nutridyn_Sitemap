name: NutriDyn Automation

# ── When to run ──────────────────────────────────────────────────────────────
on:
  # Scheduled: every weekday at 8:00 AM UTC (1:30 PM IST)
  schedule:
    - cron: '0 8 * * 1-5'

  # Manual trigger from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual trigger'

# ── Job ───────────────────────────────────────────────────────────────────────
jobs:
  nutridyn-e2e:
    name: NutriDyn E2E Test + Email Report
    runs-on: ubuntu-latest

    steps:

      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Java 21 (LTS — matches pom.xml compiler source/target)
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # 3. Install latest stable Google Chrome
      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub \
            | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" \
            >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
          echo "Chrome version: $(google-chrome --version)"

      # 4. Run the full TestNG suite
      #    • testFailureIgnore=true in pom.xml means Maven does NOT exit(1) on test failures
      #    • All secrets/variables are injected as env vars — nothing is hardcoded
      - name: Run NutriDyn automation
        env:
          # Tells NutridynConfig where to write output (screenshots + HTML report)
          GITHUB_WORKSPACE: ${{ github.workspace }}

          # Test credentials (GitHub Secrets)
          PATIENT_EMAIL:         ${{ secrets.PATIENT_EMAIL }}
          PATIENT_PASSWORD:      ${{ secrets.PATIENT_PASSWORD }}
          PRACTITIONER_EMAIL:    ${{ secrets.PRACTITIONER_EMAIL }}
          PRACTITIONER_PASSWORD: ${{ secrets.PRACTITIONER_PASSWORD }}

          # Email credentials (GitHub Secrets)
          GMAIL_SENDER_EMAIL:    ${{ secrets.GMAIL_SENDER_EMAIL }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}

          # Email recipient (GitHub Variable — not sensitive)
          REPORT_RECIPIENT:      ${{ vars.REPORT_RECIPIENT }}

          # Tells NutridynWebDriver to run Chrome in headless mode
          CI: "true"

        # 'continue-on-error: true' ensures the upload + artifact steps below
        # always run even if Maven exits non-zero for any unexpected reason
        continue-on-error: true
        run: |
          mvn test --no-transfer-progress

      # 5. Upload everything in test-output/ as a downloadable GitHub artifact
      #    'if: always()' ensures this runs even when tests fail
      - name: Upload test-output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nutridyn-report-${{ github.run_number }}
          path: ${{ github.workspace }}/test-output/
          retention-days: 30
          if-no-files-found: warn
